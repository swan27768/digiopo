<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DigiOpo</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        DigiOpo
      </div>

      <div class="header-search">
        <input
          id="taskSearch"
          placeholder="Hae tehtävää..."
          autocomplete="off"
        />

        <i class="fa-solid fa-search search-icon"></i>

        <div id="searchResults"></div>
      </div>
    </header>

    <main class="container">
      <h1>Oppilaanohjauksen digioppikirja</h1>
      <p>Valitse luokka tai selaa tehtäviä.</p>

      <section class="categories">
        <a class="category blue" href="sivut/7luokka.html">7. luokka</a>
        <a class="category green" href="#">8. luokka</a>
        <a class="category red" href="#">9. luokka</a>
        <a class="category purple" href="#">Opolle</a>
      </section>

      <section id="taskCards" class="course-grid"></section>
    </main>

    <script src="js/tehtavat.js"></script>
    <script src="js/tehtava.js"></script>
    <script src="js/kortit.js"></script>
    <script src="js/haku.js"></script>
  </body>
</html>
