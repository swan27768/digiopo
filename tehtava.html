<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tehtävä</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="task-spread">
      <div class="task-left">
        <div class="breadcrumb" id="breadcrumb"></div>

        <h1 id="taskTitle"></h1>

        <div class="task-meta">
          <span class="tag" id="taskCategoryTag"></span>
          <span class="task-class" id="taskClassLabel"></span>
        </div>

        <h2>Tehtävä</h2>
        <ul id="taskInstructions"></ul>
      </div>

      <div class="task-right">
        <h2>Kirjoita vastauksesi</h2>

        <p class="helper-text">
          Teksti tallentuu automaattisesti tälle laitteelle.
        </p>

        <textarea
          id="notes"
          class="notes-area"
          placeholder="Kirjoita vastauksesi tähän..."
        ></textarea>

        <div class="button-row">
          <button id="downloadBtn" class="btn-primary" type="button">
            Lataa Word
          </button>

          <button id="clearBtn" class="btn-secondary" type="button">
            Tyhjennä
          </button>
        </div>

        <div id="saveStatus" class="save-status"></div>

        <div class="back-row">
          <a id="backToClass" class="nav-link" href="index.html">
            ← Takaisin luokan etusivulle
          </a>
        </div>
      </div>
    </main>

    <script src="js/tehtavat.js"></script>
    <script src="js/tehtava.js"></script>
  </body>
</html>
