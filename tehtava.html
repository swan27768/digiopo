<!doctype html>

<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Tehtävä</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="topbar">
      <a href="index.html">
        <i class="fa-solid fa-arrow-left"></i>
        Takaisin
      </a>
    </header>

    <main class="container">
      <h1 id="taskTitle"></h1>

      <h2>Tehtävä</h2>

      <ul id="taskInstructions"></ul>

      <h2>Kirjoita vastauksesi</h2>

      <textarea
        id="notes"
        style="width: 100%; min-height: 200px; padding: 12px"
      ></textarea>

      <br /><br />

      <button id="downloadBtn">
        <i class="fa-solid fa-download"></i>
        Lataa Word-tiedosto
      </button>

      <button id="clearBtn">
        <i class="fa-solid fa-trash"></i>
        Tyhjennä vastaus
      </button>
    </main>

    <script src="js/tehtavat.js"></script>
    <script src="js/tehtava.js"></script>
  </body>
</html>
