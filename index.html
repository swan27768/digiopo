<!doctype html>

<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>DigiOpo</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        DigiOpo
      </div>

      <div class="search">
        <input
          id="searchInput"
          onkeyup="searchTasks()"
          placeholder="Etsi tehtävä tai aihe"
        />
      </div>
    </header>

    <main class="container">
      <h1>Oppilaanohjauksen digioppikirja</h1>

      <p>Valitse luokka tai selaa tehtäviä.</p>

      <section class="categories">
        <a class="category blue" href="sivut/7luokka.html"> 7. luokka </a>

        <a class="category green" href="sivut/8luokka.html"> 8. luokka </a>

        <a class="category red" href="sivut/9luokka.html"> 9. luokka </a>

        <a class="category purple" href="sivut/opolle.html"> Opolle </a>
      </section>

      <section class="course-grid">
        <a class="course-card" href="tehtavasivut/vahvuudet.html">
          <h3>
            <i class="fa-solid fa-star"></i>
            Omat vahvuudet
          </h3>

          <p>Pohdi missä olet hyvä ja mistä pidät.</p>

          <span class="tag"> Vahvuudet </span>
        </a>

        <div class="course-card" data-category="tet">
          <h3>
            <i class="fa-solid fa-briefcase"></i>
            TET-päiväkirja
          </h3>

          <p>Kirjaa kokemuksesi TET-jaksosta.</p>

          <span class="tag tag-tet"> TET </span>

          <a class="btn" href="tehtavat/tet.pdf" download>
            <i class="fa-solid fa-download"></i>
            Lataa tehtävä
          </a>
        </div>
      </section>
    </main>

    <script src="js/search.js"></script>
  </body>
</html>
