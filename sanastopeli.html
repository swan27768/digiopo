<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lukion sanastopeli – DigiOpo</title>
    <meta
      name="description"
      content="DigiOpon sanastopeli: yhdistä lukion termit ja määritelmät."
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- DigiOpo CSS -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/lukiosanasto.css" />
  </head>

  <body class="sanastopeli-page">
    <!-- Navigaatio -->
    <header class="navbar">
      <div class="nav-left">
        <a
          href="index.html"
          class="home-btn"
          aria-label="Takaisin DigiOpon etusivulle"
        >
          <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
          DigiOpo
        </a>
      </div>
      <div class="nav-right">
        <div class="header-search" role="search">
          <label for="taskSearch" class="sr-only">Hae tehtävää</label>
          <input
            id="taskSearch"
            type="search"
            placeholder="Hae tehtävää..."
            autocomplete="off"
            aria-label="Hae tehtävää"
          />
          <i class="fa-solid fa-search search-icon" aria-hidden="true"></i>
          <div
            id="searchResults"
            role="listbox"
            aria-label="Hakutulokset"
          ></div>
        </div>
      </div>
    </header>

    <main class="sanastopeli-main">
      <!-- Hero -->
      <section class="sanastopeli-hero">
        <div class="sanastopeli-back-row">
          <a href="sivut/9luokka.html" class="sanastopeli-back-link">
            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
            Takaisin 9. luokan sivulle
          </a>
        </div>

        <div class="sanastopeli-heading">
          <p class="sanastopeli-kicker">Interaktiivinen tehtävä</p>
          <h1 id="game-title">Lukion sanastopeli</h1>
          <p id="instruction-text">
            Yhdistä termi oikeaan määritelmään klikkaamalla ensin termiä ja
            sitten määritelmää.
          </p>
        </div>
      </section>

      <!-- Tilastot -->
      <section class="sanastopeli-stats" aria-label="Pelin tilastot">
        <div class="sanastopeli-stats-grid">
          <article class="sanastopeli-stat-card is-score">
            <span class="sanastopeli-stat-label">Nykyiset pisteet</span>
            <strong id="current-score">0</strong>
          </article>
          <article class="sanastopeli-stat-card is-total">
            <span class="sanastopeli-stat-label">Yhteensä</span>
            <strong id="total-score">0</strong>
          </article>
          <article class="sanastopeli-stat-card is-matches">
            <span class="sanastopeli-stat-label">Parit</span>
            <strong id="matches">0/6</strong>
          </article>
          <article class="sanastopeli-stat-card is-hints">
            <span class="sanastopeli-stat-label">Vinkit</span>
            <strong id="hints-left">3</strong>
          </article>
        </div>

        <div class="sanastopeli-progress-wrap" aria-hidden="true">
          <div class="sanastopeli-progress-track">
            <div id="progress-bar" class="sanastopeli-progress-bar"></div>
          </div>
        </div>

        <div class="sanastopeli-actions">
          <button
            id="hint-btn"
            class="sanastopeli-btn sanastopeli-btn-hint"
            type="button"
          >
            <i class="fa-solid fa-lightbulb" aria-hidden="true"></i>
            Vinkki
          </button>
          <button
            id="shuffle-btn"
            class="sanastopeli-btn sanastopeli-btn-shuffle"
            type="button"
          >
            <i class="fa-solid fa-shuffle" aria-hidden="true"></i>
            Sekoita
          </button>
        </div>
      </section>

      <!-- Pelilauta -->
      <section class="sanastopeli-board" aria-label="Sanastopeli">
        <div class="sanastopeli-column">
          <h2>Termit</h2>
          <div id="terms-container" class="sanastopeli-cards"></div>
        </div>
        <div class="sanastopeli-column">
          <h2>Määritelmät</h2>
          <div id="definitions-container" class="sanastopeli-cards"></div>
        </div>
      </section>
    </main>

    <!-- Palaute (toast) -->
    <div id="feedback" class="sanastopeli-feedback" aria-live="polite"></div>

    <!-- Voittomodaali -->
    <div
      id="victory-modal"
      class="sanastopeli-modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="sanastopeli-modal-card">
        <div class="sanastopeli-modal-inner">
          <h2 id="modal-title">Loistavaa!</h2>
          <p>Löysit kaikki parit.</p>

          <div class="sanastopeli-modal-stats">
            <div class="sanastopeli-modal-stat">
              <strong id="final-score">0</strong>
              <span>Pisteet</span>
            </div>
            <div class="sanastopeli-modal-stat">
              <strong id="final-accuracy">0%</strong>
              <span>Tarkkuus</span>
            </div>
          </div>

          <button
            id="play-again-btn"
            class="sanastopeli-btn sanastopeli-btn-next"
            type="button"
          >
            <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
            Seuraava peli
          </button>
        </div>
      </div>
    </div>

    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      /* Hakukentän tyylit tumman taustan päälle */
      .header-search input {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.2);
        color: white;
      }
      .header-search input::placeholder {
        color: rgba(255, 255, 255, 0.55);
      }
      .search-icon {
        color: rgba(255, 255, 255, 0.6);
      }
      #searchResults {
        background: #1e293b;
        border-color: #334155;
      }
      .result-item {
        color: #e2e8f0;
        border-color: #334155;
      }
      .result-item:hover {
        background: #334155;
      }
    </style>

    <script src="js/tehtavat.js"></script>
    <script src="js/haku.js"></script>
    <script src="js/sanastopeli.js"></script>
  </body>
</html>
