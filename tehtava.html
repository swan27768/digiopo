<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tehtävä – DigiOpo</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/components.css" />

    <style>
      /* ── Pohja ─────────────────────────────────────────────── */
      body {
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding-bottom: 60px;
      }

      /* ── Sisältösäiliö ──────────────────────────────────────── */
      .task-container {
        max-width: 820px;
        margin: 32px auto;
        padding: 0 20px;
      }

      /* ── Breadcrumb ─────────────────────────────────────────── */
      .breadcrumb {
        font-size: 13px;
        color: var(--text-light);
        margin-bottom: 20px;
      }

      .breadcrumb a {
        color: var(--primary);
        text-decoration: none;
      }

      .breadcrumb a:hover {
        text-decoration: underline;
      }

      /* ── Tehtäväotsikko ─────────────────────────────────────── */
      .task-header {
        margin-bottom: 24px;
      }

      .task-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }

      .task-header h1 {
        font-size: 1.7rem;
        color: var(--text);
        margin: 0 0 6px;
        line-height: 1.3;
      }

      /* ── Tehtävänanto ───────────────────────────────────────── */
      .task-instructions {
        background: var(--color-teoria);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px 20px;
        margin-bottom: 24px;
      }

      .task-instructions h2 {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0 0 12px;
      }

      .task-instructions ol {
        margin: 0;
        padding-left: 20px;
      }

      .task-instructions li {
        margin-bottom: 8px;
        line-height: 1.6;
        color: var(--text);
        font-size: 15px;
      }

      .task-instructions li:last-child {
        margin-bottom: 0;
      }

      /* ── Tekstilaatikko ─────────────────────────────────────── */
      .task-notes-wrapper {
        position: relative;
        margin-bottom: 16px;
      }

      .task-notes-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-light);
        margin-bottom: 8px;
        display: block;
      }

      #notes {
        width: 100%;
        min-height: 220px;
        padding: 16px;
        background: #ffffff;
        color: #0f172a;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: inherit;
        font-size: 15px;
        line-height: 1.7;
        resize: none;
        overflow: hidden;
        box-sizing: border-box;
        transition: border-color 0.2s ease;
      }

      #notes:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1);
      }

      #notes::placeholder {
        color: #94a3b8;
      }

      /* ── Tallennettu-tila ───────────────────────────────────── */
      .save-status {
        font-size: 12px;
        color: #16a34a;
        min-height: 18px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* ── Nappirivit ─────────────────────────────────────────── */
      .task-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 4px;
      }

      .btn-action {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition:
          background 0.2s ease,
          transform 0.15s ease;
        text-decoration: none;
      }

      .btn-action:hover {
        transform: translateY(-1px);
      }

      .btn-download {
        background: var(--primary);
        color: white;
      }

      .btn-download:hover {
        background: var(--primary-hover);
      }

      .btn-clear {
        background: #fee2e2;
        color: #991b1b;
      }

      .btn-clear:hover {
        background: #fecaca;
      }

      .btn-close {
        background: var(--color-teoria);
        color: var(--text-light);
        margin-left: auto;
      }

      .btn-close:hover {
        background: #e2e8f0;
        color: var(--text);
      }

      /* ── Keskustelu-tyyppi: piilota nappirivit ──────────────── */
      body.tyyppi-keskustelu .task-actions,
      body.tyyppi-keskustelu .task-notes-wrapper,
      body.tyyppi-keskustelu .save-status {
        display: none;
      }

      /* ── Mobiili ────────────────────────────────────────────── */
      @media (max-width: 640px) {
        .task-container {
          margin: 16px auto;
        }

        .task-header h1 {
          font-size: 1.4rem;
        }

        .btn-close {
          margin-left: 0;
          width: 100%;
          justify-content: center;
        }
      }

      /* ── Saavutettavuus ─────────────────────────────────────── */
      .btn-action:focus-visible {
        outline: 3px solid var(--tag-vahvuudet);
        outline-offset: 2px;
      }
    </style>
  </head>

  <body>
    <!-- Navigaatio -->
    <header class="navbar">
      <div class="nav-left">
        <a
          id="backToClass"
          href="../index.html"
          class="home-btn"
          aria-label="Takaisin luokan sivulle"
        >
          <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
          Takaisin
        </a>
      </div>
      <div class="nav-right">
        <span
          id="taskClassLabel"
          class="tag"
          style="background: var(--primary); color: white"
        ></span>
      </div>
    </header>

    <!-- Sisältö -->
    <div class="task-container">
      <!-- Breadcrumb -->
      <div
        class="breadcrumb"
        id="breadcrumb"
        aria-label="Sijaintisi sivustolla"
      >
        <a href="../index.html">Etusivu</a> → Tehtävä
      </div>

      <!-- Otsikko ja meta -->
      <div class="task-header">
        <div class="task-meta">
          <span id="taskCategoryTag" class="tag"></span>
        </div>
        <h1 id="taskTitle">Ladataan...</h1>
      </div>

      <!-- Tehtävänanto -->
      <div class="task-instructions">
        <h2>Tehtävänanto</h2>
        <ol id="taskInstructions"></ol>
      </div>

      <!-- Tekstilaatikko -->
      <div class="task-notes-wrapper">
        <label class="task-notes-label" for="notes"
          >Kirjoita vastauksesi tähän:</label
        >
        <textarea
          id="notes"
          placeholder="Aloita kirjoittaminen tähän..."
          aria-label="Vastausalue"
        ></textarea>
      </div>

      <!-- Tallennettu-tila -->
      <div
        class="save-status"
        id="saveStatus"
        aria-live="polite"
        role="status"
      ></div>

      <!-- Napit -->
      <div class="task-actions">
        <button id="downloadBtn" class="btn-action btn-download">
          <i class="fa-solid fa-download" aria-hidden="true"></i>
          Lataa txt-tiedostona
        </button>

        <button id="clearBtn" class="btn-action btn-clear">
          <i class="fa-solid fa-trash" aria-hidden="true"></i>
          Poista vastaus
        </button>

        <button id="closeBtn" class="btn-action btn-close">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          Sulje tehtävä
        </button>
      </div>
    </div>

    <!-- Tekstilaatikon automaattinen kasvu -->
    <script>
      const notes = document.getElementById("notes");
      if (notes) {
        function autoResize() {
          notes.style.height = "auto";
          notes.style.height = notes.scrollHeight + "px";
        }
        notes.addEventListener("input", autoResize);
        autoResize();
      }
    </script>

    <script src="js/tehtavat.js"></script>
    <script src="js/tehtava.js"></script>
  </body>
</html>
